# Jekyll Configuration for Backend Engineer Knowledge Base

# Site Settings
title: Backend Engineer's Knowledge Base
description: Personal knowledge base for backend engineering - work notes, architecture patterns, cloud services, and side projects
url: https://orvie.github.io
baseurl: ""

# Author Information
author:
  name: Orvie
  email: orvie@users.noreply.github.com
  github: orvie

# Build Settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Navigation Menu - Main Categories
header_pages:
  - index.md
  - web-development.md
  - cloud-providers.md
  - backend-development.md
  - architecture-patterns.md
  - databases.md
  - tools-devops.md

# Exclude from processing
exclude:
  - .github
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - node_modules

# Collections for organized content
collections:
  # Web Development
  web_development:
    output: true
    permalink: /web-development/:name/
  
  # Cloud Providers
  cloud_aws:
    output: true
    permalink: /cloud-providers/aws/:name/
  cloud_digitalocean:
    output: true
    permalink: /cloud-providers/digitalocean/:name/
  cloud_cloudflare:
    output: true
    permalink: /cloud-providers/cloudflare/:name/
  
  # Backend Development
  backend_java:
    output: true
    permalink: /backend-development/java/:name/
  backend_springboot:
    output: true
    permalink: /backend-development/springboot/:name/
  backend_apis:
    output: true
    permalink: /backend-development/apis/:name/
  backend_patterns:
    output: true
    permalink: /backend-development/patterns/:name/
  
  # Architecture Patterns
  architecture:
    output: true
    permalink: /architecture-patterns/:name/
  
  # Databases
  databases:
    output: true
    permalink: /databases/:name/
  
  # Tools & DevOps
  devops:
    output: true
    permalink: /tools-devops/:name/

# Front matter defaults
defaults:
  - scope:
      path: "_web_development"
    values:
      layout: "page"
  - scope:
      path: "_cloud_aws"
    values:
      layout: "page"
  - scope:
      path: "_cloud_digitalocean"
    values:
      layout: "page"
  - scope:
      path: "_cloud_cloudflare"
    values:
      layout: "page"
  - scope:
      path: "_backend_java"
    values:
      layout: "page"
  - scope:
      path: "_backend_springboot"
    values:
      layout: "page"
  - scope:
      path: "_backend_apis"
    values:
      layout: "page"
  - scope:
      path: "_backend_patterns"
    values:
      layout: "page"
  - scope:
      path: "_architecture"
    values:
      layout: "page"
  - scope:
      path: "_databases"
    values:
      layout: "page"
  - scope:
      path: "_devops"
    values:
      layout: "page"

# Pagination
paginate: 10
paginate_path: /page:num/

# SEO & Social
twitter:
  username: your-twitter-handle
social:
  name: Orvie
  links:
    - https://github.com/orvie

# Analytics (optional)
# google_analytics: YOUR_TRACKING_ID
