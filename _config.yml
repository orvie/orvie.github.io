# Jekyll Configuration for Orvie's Knowledge Base

# Site Settings
title: Orvie's Knowledge Base
description: Personal knowledge base for project notes, configuration tips, and learning resources
url: https://orvie.github.io
baseurl: ""

# Author Information
author:
  name: Orvie
  email: orvie@users.noreply.github.com
  github: orvie

# Build Settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Navigation Menu - Main Categories
header_pages:
  - index.md
  - web-deployment.md
  - social-networks.md
  - ai-study.md
  - devops.md
  - quick-reference.md

# Exclude from processing
exclude:
  - .github
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - CLAUDE.md

# Collections for organized content
collections:
  # Web Deployment
  web_deployment:
    output: true
    permalink: /web-deployment/:name/

  # Social Networks
  social_networks:
    output: true
    permalink: /social-networks/:name/

  # AI & Self-Study
  ai_study:
    output: true
    permalink: /ai-study/:name/

  # DevOps
  devops:
    output: true
    permalink: /devops/:name/

# Front matter defaults
defaults:
  - scope:
      path: "_web_deployment"
    values:
      layout: "page"
  - scope:
      path: "_social_networks"
    values:
      layout: "page"
  - scope:
      path: "_ai_study"
    values:
      layout: "page"
  - scope:
      path: "_devops"
    values:
      layout: "page"

# Pagination
paginate: 10
paginate_path: /page:num/

# SEO & Social
twitter:
  username: your-twitter-handle
social:
  name: Orvie
  links:
    - https://github.com/orvie

# Analytics (optional)
# google_analytics: YOUR_TRACKING_ID
